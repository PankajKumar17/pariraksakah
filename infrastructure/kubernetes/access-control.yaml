# Access Control — Deployment, Service, HPA, ConfigMap
apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-control
  namespace: cybershield
  labels:
    app: access-control
    tier: application
spec:
  replicas: 3
  selector:
    matchLabels:
      app: access-control
  template:
    metadata:
      labels:
        app: access-control
        tier: application
    spec:
      serviceAccountName: access-control-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: access-control
          image: ghcr.io/cybershield-x/access-control:latest
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: access-control-config
            - secretRef:
                name: cybershield-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: access-control
  namespace: cybershield
spec:
  type: ClusterIP
  selector:
    app: access-control
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: access-control-hpa
  namespace: cybershield
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: access-control
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: access-control-config
  namespace: cybershield
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "timescaledb"
  POSTGRES_PORT: "5432"
  ACCESS_CONTROL_PORT: "8002"
